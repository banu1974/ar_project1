<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR - Prompt as Fate</title>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe-master.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; background: #000; }
    </style>
    
    <script>
      AFRAME.registerComponent('markerhandler', {
        init: function () {
          let marker = this.el;
          let vid = document.querySelector('#arVideo');

          // Marker kamerada göründüğünde videoyu başlat
          marker.addEventListener('markerFound', function () {
            vid.play();
          });

          // Marker kameradan çıktığında videoyu durdur
          marker.addEventListener('markerLost', function () {
            vid.pause();
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; matrixCodeType: 3x3;">

      <a-assets>
        <img id="arImage" src="IMG_9181xyz.jpg" crossorigin="anonymous">
        <video id="arVideo" src="sabit_araba_hareketli_agaclar.mp4"
               preload="auto" loop crossorigin="anonymous"
               webkit-playsinline autoplay muted playsinline></video>
      </a-assets>

      <a-marker
        type="pattern"
        url="pattern-marker.patt"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5"
        emitevents="true"
        markerhandler>

        <a-image
          src="#arImage"
          rotation="-90 0 0"
          position="-0.65 0.01 0"
          width="1.2"
          height="0.8"
          opacity="1">
        </a-image>

        <a-video
          src="#arVideo"
          rotation="-90 0 0"
          position="0.65 0.01 0"
          width="1.2"
          height="0.8"
          opacity="1">
        </a-video>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
